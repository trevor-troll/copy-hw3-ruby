name: Autograding Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.8"
          bundler-cache: false

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libxml2-dev libxslt1-dev

      - name: Decrypt autograder
        env:
          AUTOGRADER_KEY: ${{ secrets.AUTOGRADER_KEY }}
        run: |
          mkdir -p autograder
          openssl enc -aes-256-cbc -pbkdf2 -d -pass pass:"$AUTOGRADER_KEY" \
            -in .github/secure/autograder.tgz.enc \
            -out /tmp/autograder.tgz
          tar -xzf /tmp/autograder.tgz -C autograder
          rm -f /tmp/autograder.tgz

      - name: Install app gems
        run: bundle install --jobs 4 --retry 3

      - name: Install autograder gems
        run: BUNDLE_GEMFILE=autograder/Gemfile bundle install --jobs 4 --retry 3

      - name: Prepare database
        run: RAILS_ENV=test bin/rails db:create db:migrate db:seed --trace

      - name: Start Rails server
        run: RAILS_ENV=test bin/rails server -d -p 3000

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:3000 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start in time" >&2
          exit 1

      - name: Run autograder
        continue-on-error: true
        run: |
          mkdir -p autograder/results
          cd autograder
          AUTOGRADER_URI=localhost:3000 BUNDLE_GEMFILE=Gemfile bundle exec rspec \
            --require ./rspec_gradescope_formatter.rb \
            --format RSpecGradescopeFormatter \
            ./app_spec.rb || true

      - name: App responds to request
        id: app-responds
        uses: classroom-resources/autograding-command-grader@v1
        if: always()
        env:
          TEST_NAME: "App responds to a simple request [10 points]"
        with:
          test-name: "App: responds to request"
          setup-command: ""
          command: |
            python - <<'PY'
            import json
            import os
            import sys

            name = os.environ["TEST_NAME"]
            with open("autograder/results/results.json") as f:
              data = json.load(f)
            for test in data.get("tests", []):
              if test.get("name") == name:
                sys.exit(0 if test.get("score") == test.get("max_score") else 1)
            sys.exit(1)
            PY
          timeout: 5
          max-score: 10

      - name: Ratings form exists
        id: ratings-form
        uses: classroom-resources/autograding-command-grader@v1
        if: always()
        env:
          TEST_NAME: "Ratings Form has #ratings_form form [5 points]"
        with:
          test-name: "Ratings Form: has form"
          setup-command: ""
          command: |
            python - <<'PY'
            import json
            import os
            import sys

            name = os.environ["TEST_NAME"]
            with open("autograder/results/results.json") as f:
              data = json.load(f)
            for test in data.get("tests", []):
              if test.get("name") == name:
                sys.exit(0 if test.get("score") == test.get("max_score") else 1)
            sys.exit(1)
            PY
          timeout: 5
          max-score: 5

      - name: Ratings submit button exists
        id: ratings-submit
        uses: classroom-resources/autograding-command-grader@v1
        if: always()
        env:
          TEST_NAME: "Ratings Form has #ratings_submit button [5 points]"
        with:
          test-name: "Ratings Form: has submit"
          setup-command: ""
          command: |
            python - <<'PY'
            import json
            import os
            import sys

            name = os.environ["TEST_NAME"]
            with open("autograder/results/results.json") as f:
              data = json.load(f)
            for test in data.get("tests", []):
              if test.get("name") == name:
                sys.exit(0 if test.get("score") == test.get("max_score") else 1)
            sys.exit(1)
            PY
          timeout: 5
          max-score: 5

      - name: Rating checkboxes exist
        id: ratings-checkboxes
        uses: classroom-resources/autograding-command-grader@v1
        if: always()
        env:
          TEST_NAME: "Ratings Form has rating checkboxes [5 points]"
        with:
          test-name: "Ratings Form: has checkboxes"
          setup-command: ""
          command: |
            python - <<'PY'
            import json
            import os
            import sys

            name = os.environ["TEST_NAME"]
            with open("autograder/results/results.json") as f:
              data = json.load(f)
            for test in data.get("tests", []):
              if test.get("name") == name:
                sys.exit(0 if test.get("score") == test.get("max_score") else 1)
            sys.exit(1)
            PY
          timeout: 5
          max-score: 5

      - name: Checkbox defaults uniform
        id: ratings-defaults
        uses: classroom-resources/autograding-command-grader@v1
        if: always()
        env:
          TEST_NAME: "Ratings Form checkboxes are uniformly checked or unchecked by default [10 points]"
        with:
          test-name: "Ratings Form: defaults"
          setup-command: ""
          command: |
            python - <<'PY'
            import json
            import os
            import sys

            name = os.environ["TEST_NAME"]
            with open("autograder/results/results.json") as f:
              data = json.load(f)
            for test in data.get("tests", []):
              if test.get("name") == name:
                sys.exit(0 if test.get("score") == test.get("max_score") else 1)
            sys.exit(1)
            PY
          timeout: 5
          max-score: 10

      - name: Filter by rating
        id: filter-by-rating
        uses: classroom-resources/autograding-command-grader@v1
        if: always()
        env:
          TEST_NAME: "Movie Filtering filters movies by selected rating [20 points]"
        with:
          test-name: "Filtering: by rating"
          setup-command: ""
          command: |
            python - <<'PY'
            import json
            import os
            import sys

            name = os.environ["TEST_NAME"]
            with open("autograder/results/results.json") as f:
              data = json.load(f)
            for test in data.get("tests", []):
              if test.get("name") == name:
                sys.exit(0 if test.get("score") == test.get("max_score") else 1)
            sys.exit(1)
            PY
          timeout: 5
          max-score: 20

      - name: Persist ratings after submit
        id: persist-ratings-submit
        uses: classroom-resources/autograding-command-grader@v1
        if: always()
        env:
          TEST_NAME: "Movie Filtering persists checked ratings after submission [25 points]"
        with:
          test-name: "Filtering: persist after submit"
          setup-command: ""
          command: |
            python - <<'PY'
            import json
            import os
            import sys

            name = os.environ["TEST_NAME"]
            with open("autograder/results/results.json") as f:
              data = json.load(f)
            for test in data.get("tests", []):
              if test.get("name") == name:
                sys.exit(0 if test.get("score") == test.get("max_score") else 1)
            sys.exit(1)
            PY
          timeout: 5
          max-score: 25

      - name: Sort by Title
        id: sort-title
        uses: classroom-resources/autograding-command-grader@v1
        if: always()
        env:
          TEST_NAME: "Movie Sorting can sort by Title via dropdown [20 points]"
        with:
          test-name: "Sorting: Title"
          setup-command: ""
          command: |
            python - <<'PY'
            import json
            import os
            import sys

            name = os.environ["TEST_NAME"]
            with open("autograder/results/results.json") as f:
              data = json.load(f)
            for test in data.get("tests", []):
              if test.get("name") == name:
                sys.exit(0 if test.get("score") == test.get("max_score") else 1)
            sys.exit(1)
            PY
          timeout: 5
          max-score: 20

      - name: Sort by Release Date
        id: sort-release
        uses: classroom-resources/autograding-command-grader@v1
        if: always()
        env:
          TEST_NAME: "Movie Sorting can sort by Release Date via dropdown [20 points]"
        with:
          test-name: "Sorting: Release date"
          setup-command: ""
          command: |
            python - <<'PY'
            import json
            import os
            import sys

            name = os.environ["TEST_NAME"]
            with open("autograder/results/results.json") as f:
              data = json.load(f)
            for test in data.get("tests", []):
              if test.get("name") == name:
                sys.exit(0 if test.get("score") == test.get("max_score") else 1)
            sys.exit(1)
            PY
          timeout: 5
          max-score: 20

      - name: Persist filters when sorting
        id: persist-filters-sorting
        uses: classroom-resources/autograding-command-grader@v1
        if: always()
        env:
          TEST_NAME: "Movie Sorting persists rating filters when sorting [25 points]"
        with:
          test-name: "Sorting: persist filters"
          setup-command: ""
          command: |
            python - <<'PY'
            import json
            import os
            import sys

            name = os.environ["TEST_NAME"]
            with open("autograder/results/results.json") as f:
              data = json.load(f)
            for test in data.get("tests", []):
              if test.get("name") == name:
                sys.exit(0 if test.get("score") == test.get("max_score") else 1)
            sys.exit(1)
            PY
          timeout: 5
          max-score: 25

      - name: Remember sort after reload
        id: remember-sort
        uses: classroom-resources/autograding-command-grader@v1
        if: always()
        env:
          TEST_NAME: "Movie Sorting remembers sort order after reload [20 points]"
        with:
          test-name: "Sorting: remember after reload"
          setup-command: ""
          command: |
            python - <<'PY'
            import json
            import os
            import sys

            name = os.environ["TEST_NAME"]
            with open("autograder/results/results.json") as f:
              data = json.load(f)
            for test in data.get("tests", []):
              if test.get("name") == name:
                sys.exit(0 if test.get("score") == test.get("max_score") else 1)
            sys.exit(1)
            PY
          timeout: 5
          max-score: 20

      - name: RESTful route on filter/sort
        id: restful-route
        uses: classroom-resources/autograding-command-grader@v1
        if: always()
        env:
          TEST_NAME: "RESTful Behavior redirects to RESTful route on filter/sort [10 points]"
        with:
          test-name: "RESTful: route"
          setup-command: ""
          command: |
            python - <<'PY'
            import json
            import os
            import sys

            name = os.environ["TEST_NAME"]
            with open("autograder/results/results.json") as f:
              data = json.load(f)
            for test in data.get("tests", []):
              if test.get("name") == name:
                sys.exit(0 if test.get("score") == test.get("max_score") else 1)
            sys.exit(1)
            PY
          timeout: 5
          max-score: 10

      - name: Restore ratings after reload
        id: restore-ratings
        uses: classroom-resources/autograding-command-grader@v1
        if: always()
        env:
          TEST_NAME: "RESTful Behavior restores rating filters after reload [20 points]"
        with:
          test-name: "RESTful: restore ratings"
          setup-command: ""
          command: |
            python - <<'PY'
            import json
            import os
            import sys

            name = os.environ["TEST_NAME"]
            with open("autograder/results/results.json") as f:
              data = json.load(f)
            for test in data.get("tests", []):
              if test.get("name") == name:
                sys.exit(0 if test.get("score") == test.get("max_score") else 1)
            sys.exit(1)
            PY
          timeout: 5
          max-score: 20

      - name: Restore sort after reload
        id: restore-sort
        uses: classroom-resources/autograding-command-grader@v1
        if: always()
        env:
          TEST_NAME: "RESTful Behavior restores sort order after reload [15 points]"
        with:
          test-name: "RESTful: restore sort"
          setup-command: ""
          command: |
            python - <<'PY'
            import json
            import os
            import sys

            name = os.environ["TEST_NAME"]
            with open("autograder/results/results.json") as f:
              data = json.load(f)
            for test in data.get("tests", []):
              if test.get("name") == name:
                sys.exit(0 if test.get("score") == test.get("max_score") else 1)
            sys.exit(1)
            PY
          timeout: 5
          max-score: 15

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        if: always()
        env:
          APP-RESPONDS_RESULTS: ${{ steps.app-responds.outputs.result }}
          RATINGS-FORM_RESULTS: ${{ steps.ratings-form.outputs.result }}
          RATINGS-SUBMIT_RESULTS: ${{ steps.ratings-submit.outputs.result }}
          RATINGS-CHECKBOXES_RESULTS: ${{ steps.ratings-checkboxes.outputs.result }}
          RATINGS-DEFAULTS_RESULTS: ${{ steps.ratings-defaults.outputs.result }}
          FILTER-BY-RATING_RESULTS: ${{ steps.filter-by-rating.outputs.result }}
          PERSIST-RATINGS-SUBMIT_RESULTS: ${{ steps.persist-ratings-submit.outputs.result }}
          SORT-TITLE_RESULTS: ${{ steps.sort-title.outputs.result }}
          SORT-RELEASE_RESULTS: ${{ steps.sort-release.outputs.result }}
          PERSIST-FILTERS-SORTING_RESULTS: ${{ steps.persist-filters-sorting.outputs.result }}
          REMEMBER-SORT_RESULTS: ${{ steps.remember-sort.outputs.result }}
          RESTFUL-ROUTE_RESULTS: ${{ steps.restful-route.outputs.result }}
          RESTORE-RATINGS_RESULTS: ${{ steps.restore-ratings.outputs.result }}
          RESTORE-SORT_RESULTS: ${{ steps.restore-sort.outputs.result }}
        with:
          runners: app-responds,ratings-form,ratings-submit,ratings-checkboxes,ratings-defaults,filter-by-rating,persist-ratings-submit,sort-title,sort-release,persist-filters-sorting,remember-sort,restful-route,restore-ratings,restore-sort

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: autograder-results
          path: autograder/results/results.json
